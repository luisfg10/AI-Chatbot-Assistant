# User Prompts used for the chatbot

# ------------------------------------------------------------------
# Chatbot

chatbot:
  template: |
    {memory}
    Current user query: {user query}

  memory template: |
    Here's a recap of your current conversation:
    {history}


# ------------------------------------------------------------------
# Memory Management

memory manager:
  template: |
    Long-term memory: {long term memory}
    Recent interactions:
    {short term memory}
  short term template: |
    * Turn #{turn number}:
      User: {user input}
      Chatbot: {chatbot response}
